<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Songs</title>
    <link rel="icon" href="https://icongr.am/feather/music.svg?size=128&color=3b82f6" type="image/svg+xml">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/modals.css">
</head>
<body>
    <header>
        <div class="header-main">
            <h1>Anime Songs</h1>
            <input type="search" id="anime-search-input" placeholder="Buscar anime...">
        </div>
        <div class="header-actions">
            <a href="artists.html" class="icon-btn" title="Ver Artistas">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            </a>
            <button id="login-btn" title="Iniciar sesión como Admin">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </button>
            <button id="logout-btn" title="Cerrar sesión" style="display: none;">Logout</button>
            <button id="theme-toggle" title="Cambiar tema">
                <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </header>

    <main>
        <div id="error-toast" class="error-toast"></div>
        <section id="season-manager">
            <h2>Temporadas</h2>
            <select id="season-selector"></select>
            <div class="season-actions">
                <button id="add-season-btn" title="Nueva Temporada">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <button id="add-continuation-btn" title="Añadir Continuación">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.72"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.72-1.72"></path></svg>
                </button>
                <button id="edit-season-btn" title="Editar Temporada">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
                <button id="delete-season-btn" title="Eliminar Temporada">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
            </div>
        </section>

        <section id="anime-list-container">
            <!-- Los animes de la temporada seleccionada se mostrarán aquí -->
        </section>

        <button id="add-anime-btn" class="fab">+</button>
        <button id="scroll-to-top-btn" class="fab fab-secondary" title="Subir al Inicio" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
    </main>

    <!-- Modal para agregar nueva temporada -->
    <div id="add-season-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Nueva Temporada</h2>
            <input type="text" id="season-name-input" placeholder="Nombre de la temporada (ej. Verano 2024)">
            <button id="save-season-btn">Guardar</button>
        </div>
    </div>

    <!-- Modal para agregar nuevo anime -->
    <div id="add-anime-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Agregar Anime</h2>
            <div id="edit-season-section" class="form-group" style="display: none;">
                <label for="anime-season-select">Cambiar Temporada:</label>
                <select id="anime-season-select"></select>
            </div>
            <div id="continuation-section" style="display: none;">
                <label for="continuation-select">Seleccionar anime a continuar:</label>
                <select id="continuation-select"></select>
            </div>
            <div id="new-anime-section">
                <input type="text" id="anime-name-input" placeholder="Nombre del Anime">
            </div>
            <select id="day-of-week-input">
                <option value="Lunes">Lunes</option>
                <option value="Martes">Martes</option>
                <option value="Miércoles">Miércoles</option>
                <option value="Jueves">Jueves</option>
                <option value="Viernes">Viernes</option>
                <option value="Sábado">Sábado</option>
                <option value="Domingo">Domingo</option>
                <option value="Especial">Especial (OVA, Película, etc.)</option>
            </select>
            <fieldset>
                <legend>Openings</legend>
                <div id="openings-list" class="dynamic-list"></div>
                <button type="button" id="add-opening-btn" class="add-entry-btn" title="Agregar Opening">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                </button>
            </fieldset>
            <fieldset>
                <legend>Endings</legend>
                <div id="endings-list" class="dynamic-list"></div>
                <button type="button" id="add-ending-btn" class="add-entry-btn" title="Agregar Ending">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                </button>
            </fieldset>
            <textarea id="comments-input" placeholder="Comentarios"></textarea>
            <button id="save-anime-btn">Guardar</button>
        </div>
    </div>

    <!-- Modal para Login -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Admin Login</h2>
            <input type="password" id="password-input" placeholder="Contraseña">
            <button id="login-submit-btn">Entrar</button>
        </div>
    </div>

    <!-- Modal para Video -->
    <div id="video-modal" class="modal">
        <div class="modal-content video-modal-content">
            <div class="video-modal-header">
                <a id="open-in-yt-link" href="#" target="_blank" title="Abrir en una nueva pestaña de YouTube" class="video-modal-action">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                    <span>Abrir en YouTube</span>
                </a>
                <span class="close-btn">&times;</span>
            </div>
            <div class="video-container">
                <iframe id="youtube-iframe" width="560" height="315" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
