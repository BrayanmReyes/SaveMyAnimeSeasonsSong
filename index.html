<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Songs</title>
    <link rel="icon" href="https://icongr.am/feather/music.svg?size=128&color=3b82f6" type="image/svg+xml">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Anime Songs</h1>
        <button id="theme-toggle" title="Cambiar tema">
            <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </header>

    <main>
        <section id="season-manager">
            <h2>Temporadas</h2>
            <select id="season-selector"></select>
            <button id="add-season-btn">Nueva Temporada</button>
            <button id="delete-season-btn">Eliminar Temporada</button>
        </section>

        <section id="anime-list-container">
            <!-- Los animes de la temporada seleccionada se mostrarán aquí -->
        </section>

        <button id="add-anime-btn" class="fab">+</button>
    </main>

    <!-- Modal para agregar nueva temporada -->
    <div id="add-season-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Nueva Temporada</h2>
            <input type="text" id="season-name-input" placeholder="Nombre de la temporada (ej. Verano 2024)">
            <button id="save-season-btn">Guardar</button>
        </div>
    </div>

    <!-- Modal para agregar nuevo anime -->
    <div id="add-anime-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Agregar Anime</h2>
            <input type="text" id="anime-name-input" placeholder="Nombre del Anime">
            <select id="day-of-week-input">
                <option value="Lunes">Lunes</option>
                <option value="Martes">Martes</option>
                <option value="Miércoles">Miércoles</option>
                <option value="Jueves">Jueves</option>
                <option value="Viernes">Viernes</option>
                <option value="Sábado">Sábado</option>
                <option value="Domingo">Domingo</option>
                <option value="Especial">Especial (OVA, Película, etc.)</option>
            </select>
            <fieldset>
                <legend>Openings</legend>
                <div id="openings-list" class="dynamic-list"></div>
                <button type="button" id="add-opening-btn" class="add-entry-btn">Agregar Opening</button>
            </fieldset>
            <fieldset>
                <legend>Endings</legend>
                <div id="endings-list" class="dynamic-list"></div>
                <button type="button" id="add-ending-btn" class="add-entry-btn">Agregar Ending</button>
            </fieldset>
            <textarea id="comments-input" placeholder="Comentarios"></textarea>
            <button id="save-anime-btn">Guardar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
